<!DOCTYPE html>
<html lang="en">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Student portal</title>
          <link rel="stylesheet" type="text/css" href="./styles.css">
          <script type=module src="./app.js"></script>
</head>
<body>
          <header>
                    <nav>
                              <ul>
                                        <li><a href="#home">Home</a></li>
                                        <li><a href="#courses">Courses</a></li>
                                        <li><a href="#profile">Profile</a></li>
                                        <li><a href="#grades">Grades</a></li>
                              </ul>
                    </nav>
          </header>
          <main>
                    <section id="hero" >
                              <h1>Welcome to Student Portal</h1>
                              <p>This portal helps you to take care of your courses.</p>
                              <button>Explore Courses</button>
                    </section>
                    <section id="stats-bar">
                              <div class="stat-item">Courses Enrolled: 5</div>
                              <div class="stat-item">GPA: 3.8</div>
                              <div class="stat-item">Semester: 6</div>
                    </section>
                    <section id="courses">
                              <h2>Courses page</h2>
                              <input id="search-courses" placeholder="Search courses"/>
                              <button id="sort-credits">Sort by Credits</button>
                              <div class="course-grid">
                              </div>
                              <p id="total-credits"></p>
                    </section>
          </main>
          <footer></footer>
</body>
</html>
